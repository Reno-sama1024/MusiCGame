<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>MusiCGame</title>
    <style>
        /* 全局變色核心 - 加上 transition 讓變色時有絲滑的霓虹過渡感 */
        :root { 
            --neon: #00ffff; 
            --neon-rgb: 0, 255, 255;
            --bg-dark: #000000; 
            transition: --neon 0.8s ease;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; user-select: none; }
        body, html { width: 100%; height: 100%; background: var(--bg-dark); font-family: "Microsoft JhengHei", sans-serif; color: #fff; overflow: hidden; }

        /* 背景 Canvas */
        #bgCanvas { position: absolute; top:0; left:0; z-index: 1; pointer-events: none; }

        /* 核心場景圖層 */
        .scene { position: absolute; width: 100vw; height: 100vh; top:0; left:0; z-index: 10; }
        
        /* 主選單：原生置中 */
        #menu-scene { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* ==================== 🛠️ 設定頁 動畫核心配置 ==================== */
        #settings-scene { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(10px); /* 增加輕微毛玻璃，配上 OLED 純黑背景極具質感 */
            
            /* 預設狀態：隱藏且縮小 */
            opacity: 0;
            pointer-events: none;
            transform: scale(0.85) translateY(30px);
            
            /* 絲滑的彈出/收起動畫過渡，對齊 120Hz */
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 當啟動 .active 樣式時，執行彈出動畫 */
        #settings-scene.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1) translateY(0);
        }

        /* 標題極客風格 */
        .title { font-size: 65px; font-weight: bold; color: var(--neon); text-shadow: 0 0 25px var(--neon); margin-bottom: 50px; letter-spacing: 6px; transition: color 0.8s ease, text-shadow 0.8s ease; }

        /* 霓虹按鈕體系 */
        .btn-group { display: flex; flex-direction: column; gap: 20px; width: 320px; }
        .neon-btn {
            width: 100%; padding: 18px; font-size: 22px; font-weight: bold; background: rgba(0,0,0,0.7);
            color: var(--neon); border: 2px solid var(--neon); border-radius: 8px; cursor: pointer;
            box-shadow: 0 0 15px rgba(var(--neon-rgb), 0.1); transition: all 0.25s ease; text-align: center;
        }
        .neon-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); transform: scale(1.03); }

        /* 設定頁 UI 容器 */
        .settings-container { width: 600px; background: rgba(5,5,15,0.95); border: 2px solid var(--neon); border-radius: 12px; padding: 40px; box-shadow: 0 0 30px rgba(var(--neon-rgb), 0.1); transition: border 0.8s ease, box-shadow 0.8s ease; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 20px; }
        .setting-row input[type="range"] { width: 200px; accent-color: var(--neon); cursor: pointer; }
        
        /* 五色按鈕群組 */
        .color-group { display: flex; gap: 12px; }
        .color-btn { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.3s; }
        .color-btn.active { border-color: #fff; box-shadow: 0 0 15px #fff; }

        /* 按鍵對映配置格子 */
        .key-config-group { display: flex; gap: 10px; }
        .key-box { width: 50px; height: 50px; border: 2px solid var(--neon); border-radius: 6px; text-align: center; line-height: 46px; font-size: 20px; font-weight: bold; color: var(--neon); background: transparent; cursor: pointer; }
        .key-box.binding { border-color: #fff; color: #fff; animation: blink 0.5s infinite alternate; }

        @keyframes blink { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <audio id="bgmAudio" src="U.I.(Unsolved Idle).mp3" loop></audio>

    <div id="menu-scene" class="scene">
        <div class="title">MusiCGame</div>
        <div class="btn-group">
            <button class="neon-btn" onclick="navTo('gml.html')">遊玩</button>
            <button class="neon-btn" onclick="navTo('edit.html')">編輯</button>
            <button class="neon-btn" onclick="toggleSettings(true)">設定</button>
            <button class="neon-btn" onclick="exitGame()">退出</button>
        </div>
    </div>

    <div id="settings-scene" class="scene">
        <div class="title" style="font-size: 45px; margin-bottom: 30px;">GLOBAL_SETTINGS</div>
        <div class="settings-container">
            
            <div class="setting-row">
                <label>主題色彩 (Theme)</label>
                <div class="color-group">
                    <div class="color-btn" style="background: #ff0055;" onclick="applyTheme('#ff0055')"></div>
                    <div class="color-btn" style="background: #00ff66;" onclick="applyTheme('#00ff66')"></div>
                    <div class="color-btn" style="background: #00ffff;" onclick="applyTheme('#00ffff')"></div>
                    <div class="color-btn" style="background: #ffffff;" onclick="applyTheme('#ffffff')"></div>
                    <div class="color-btn" style="background: #cc00ff;" onclick="applyTheme('#cc00ff')"></div>
                </div>
            </div>

            <div class="setting-row">
                <label>全域音量 (Volume)</label>
                <div style="display:flex; align-items:center; gap:10px;">
                    <input type="range" id="bgmVolume" min="0" max="1" step="0.05" value="0.5" oninput="updateVolume(this.value)">
                    <span id="volValue" style="color:var(--neon); width:50px; font-weight:bold;">50%</span>
                </div>
            </div>

            <div class="setting-row">
                <label>譜面流速 (Speed)</label>
                <div style="display:flex; align-items:center; gap:10px;">
                    <input type="range" id="scrollSpeed" min="1" max="10" step="0.5" value="5" oninput="updateSpeedValue(this.value)">
                    <span id="speedValue" style="color:var(--neon); width:40px; font-weight:bold;">5.0</span>
                </div>
            </div>

            <div class="setting-row">
                <label>4K 按鍵對映 (Keys)</label>
                <div class="key-config-group">
                    <div class="key-box" id="key0" onclick="startKeyBind(0)">D</div>
                    <div class="key-box" id="key1" onclick="startKeyBind(1)">F</div>
                    <div class="key-box" id="key2" onclick="startKeyBind(2)">J</div>
                    <div class="key-box" id="key3" onclick="startKeyBind(3)">K</div>
                </div>
            </div>

            <button class="neon-btn" style="margin-top: 20px; padding: 12px;" onclick="toggleSettings(false)">儲存並返回</button>
        </div>
    </div>

    <script>
        // --- 全域獨立狀態大腦 ---
        let gameConfig = {
            hasConfigured: false, // 關鍵鎖定旗標
            themeColor: '#00ffff',
            bgmVolume: 0.5,
            scrollSpeed: 5.0,
            keyMaps: ['d', 'f', 'j', 'k']
        };

        const bgm = document.getElementById('bgmAudio');

        // --- 1. 頁面跳轉與退出邏輯 ---
        function navTo(url) { window.location.href = url; }
        function exitGame() { window.location.href = "about:blank"; }

        // --- 2. 設定頁彈窗動畫控制（修正記憶體缺陷） ---
        function toggleSettings(show) {
            const settingsScene = document.getElementById('settings-scene');
            
            if (show) {
                // 彈出動畫：加上 active
                settingsScene.classList.add('active');
            } else {
                // 收起動畫：移除 active
                settingsScene.classList.remove('active');
                
                // 💥 確定鎖死：按下儲存返回時，將旗標設為 true，並寫入 LocalStorage
                gameConfig.hasConfigured = true;
                localStorage.setItem('MusiCGame_Config', JSON.stringify(gameConfig));
            }
        }

        // --- 3. 音量與流速調教 ---
        function updateVolume(val) {
            bgm.volume = val;
            document.getElementById('volValue').innerText = Math.round(val * 100) + '%';
            gameConfig.bgmVolume = parseFloat(val);
        }

        function updateSpeedValue(val) {
            document.getElementById('speedValue').innerText = parseFloat(val).toFixed(1);
            gameConfig.scrollSpeed = parseFloat(val);
        }

        // --- 4. 全局五色變色系統 ---
        function applyTheme(hex) {
            gameConfig.themeColor = hex;
            document.documentElement.style.setProperty('--neon', hex);
            
            let c = hex.replace('#','');
            if(c.length === 3) c = c.split('').map(x => x+x).join('');
            const r = parseInt(c.slice(0,2), 16), g = parseInt(c.slice(2,4), 16), b = parseInt(c.slice(4,6), 16);
            document.documentElement.style.setProperty('--neon-rgb', `${r}, ${g}, ${b}`);

            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('onclick').includes(hex));
            });
        }

        // --- 5. 按鍵映射綁定 ---
        let bindingIdx = -1;
        function startKeyBind(idx) {
            bindingIdx = idx;
            document.querySelectorAll('.key-box').forEach(b => b.classList.remove('binding'));
            document.getElementById(`key${idx}`).classList.add('binding');
            document.getElementById(`key${idx}`).innerText = '?';
        }

        window.addEventListener('keydown', (e) => {
            if (bgm.paused) { bgm.play().catch(()=>{}); }

            if (bindingIdx !== -1) {
                const pressedKey = e.key.toLowerCase();
                gameConfig.keyMaps[bindingIdx] = pressedKey;
                document.getElementById(`key${bindingIdx}`).innerText = pressedKey.toUpperCase();
                document.getElementById(`key${bindingIdx}`).classList.remove('binding');
                bindingIdx = -1;
            }
        });

        window.addEventListener('click', () => { if (bgm.paused) { bgm.play().catch(()=>{}); } });

        // --- 6. 頂級生命週期控制 (徹底解決 F5 彈出問題) ---
        window.onload = () => {
            const saved = localStorage.getItem('MusiCGame_Config');
            
            if (saved) {
                // 🛠️ 核心修正：把抓出來的舊配置完全覆蓋回實體大腦 (包含 hasConfigured 旗標)
                gameConfig = JSON.parse(saved);
                
                // 還原配置 UI
                document.getElementById('scrollSpeed').value = gameConfig.scrollSpeed;
                document.getElementById('speedValue').innerText = gameConfig.scrollSpeed.toFixed(1);
                document.getElementById('bgmVolume').value = gameConfig.bgmVolume;
                document.getElementById('volValue').innerText = Math.round(gameConfig.bgmVolume * 100) + '%';
                bgm.volume = gameConfig.bgmVolume;
                
                for(let i=0; i<4; i++) {
                    document.getElementById(`key${i}`).innerText = gameConfig.keyMaps[i].toUpperCase();
                }
                applyTheme(gameConfig.themeColor);
            } else {
                applyTheme('#00ffff');
            }
            
            // 預設將主選單一直開著，這樣設定頁收起時能看見主選單
            document.getElementById('menu-scene').style.display = 'flex';
            
            // 🔥 終極判定：如果已經儲存過一次了，設定頁就不要塞 active 類別（它會隱藏在後台並套用動畫效果）
            if (!gameConfig.hasConfigured) {
                toggleSettings(true);
            }
            
            // Canvas 純黑背景保持
            const canvas = document.getElementById('bgCanvas');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        };
    </script>
</body>
</html>
