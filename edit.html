<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>MusiCGame - Map Architect Pro</title>
    <style>
        :root { 
            --neon: #00ffff; 
            --neon-rgb: 0, 255, 255;
            --bg-dark: #05050e; 
        }
        * { margin:0; padding:0; box-sizing:border-box; user-select: none; }
        body, html { width: 100%; height: 100%; background: var(--bg-dark); font-family: "Microsoft JhengHei", sans-serif; color: #fff; overflow: hidden; }

        .workspace { display: flex; width: 100vw; height: 100vh; }

        /* 左側控制面板 */
        .control-panel { 
            width: 350px; height: 100%; background: rgba(10, 10, 25, 0.95); 
            border-right: 2px solid var(--neon); box-shadow: 5px 0 25px rgba(var(--neon-rgb), 0.2);
            padding: 25px; display: flex; flex-direction: column; gap: 18px; z-index: 10;
        }
        
        .nav-buttons { display: flex; gap: 10px; margin-bottom: -5px; }
        .nav-btn {
            flex: 1; padding: 8px; font-size: 12px; font-weight: bold; background: transparent;
            color: #888; border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; cursor: pointer; transition: all 0.2s;
        }
        .nav-btn:hover { border-color: var(--neon); color: var(--neon); box-shadow: 0 0 10px rgba(var(--neon-rgb), 0.3); }

        .panel-title { font-size: 24px; font-weight: 900; color: var(--neon); text-shadow: 0 0 15px var(--neon); letter-spacing: 1px; margin-bottom: 5px; }
        
        .section-title { font-size: 14px; color: #888; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }

        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 12px; color: #aaa; }
        .input-group input, .input-group select {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(var(--neon-rgb), 0.3);
            padding: 10px; color: #fff; border-radius: 6px; font-size: 14px; transition: all 0.2s;
        }
        .input-group input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(var(--neon-rgb), 0.3); outline: none; }

        .file-label {
            display: block; text-align: center; padding: 12px; background: rgba(var(--neon-rgb), 0.1);
            border: 1px dashed var(--neon); color: var(--neon); border-radius: 6px; cursor: pointer;
            font-weight: bold; font-size: 14px; transition: all 0.2s;
        }
        .file-label:hover { background: rgba(var(--neon-rgb), 0.2); box-shadow: 0 0 15px rgba(var(--neon-rgb), 0.3); }
        input[type="file"] { display: none; }

        .status-board {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px; padding: 15px; display: flex; flex-direction: column; gap: 8px;
        }
        .status-row { display: flex; justify-content: space-between; font-size: 13px; color: #ccc; }
        .status-val { font-family: monospace; font-weight: bold; color: #fff; }
        #ui-snap { color: var(--neon); text-shadow: 0 0 8px var(--neon); font-size: 14px; }

        .btn {
            width: 100%; padding: 12px; font-size: 14px; font-weight: bold; cursor: pointer;
            border-radius: 6px; border: none; transition: all 0.2s;
        }
        .btn-primary { background: var(--neon); color: #000; font-weight: 900; box-shadow: 0 0 15px rgba(var(--neon-rgb), 0.3); }
        .btn-primary:hover { opacity: 0.9; box-shadow: 0 0 25px var(--neon); }
        .btn-secondary { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); border-color: #fff; }

        .editor-container { flex: 1; height: 100%; position: relative; overflow: hidden; background: #020206; }
        canvas { display: block; width: 100%; height: 100%; }

        .tip-bar {
            position: absolute; top: 15px; right: 20px; background: rgba(0,0,0,0.7);
            padding: 8px 15px; border-radius: 20px; font-size: 12px; color: #aaa;
            border: 1px solid rgba(255,255,255,0.1); pointer-events: none;
        }
        .tip-bar span { color: var(--neon); font-weight: bold; }
    </style>
</head>
<body>

    <div class="workspace">
        <div class="control-panel">
            <div class="nav-buttons">
                <button class="nav-btn" onclick="location.href='MusiCGame.html'">🏠 主畫面</button>
                <button class="nav-btn" onclick="location.href='gml.html'">🎵 選曲介面</button>
            </div>

            <div class="panel-title">Map Architect</div>
            
            <div class="section-title">1. 音樂與基礎設定</div>
            <div class="input-group">
                <label>音樂檔案 (.mp3 / .wav)</label>
                <label for="audio-upload" class="file-label" id="audio-label">選擇音樂檔案</label>
                <input type="file" id="audio-upload" accept="audio/*" onchange="loadAudio(this)">
            </div>
            <div class="input-group">
                <label>歌曲名稱</label>
                <input type="text" id="song-title" value="New_Track" placeholder="例如: Neo_Sanctuary">
            </div>
            <div class="input-group">
                <label>歌曲 BPM</label>
                <input type="number" id="song-bpm" value="120" min="30" max="400" onchange="updateGridSpacing()">
            </div>

            <div class="section-title">2. 譜面數據交互</div>
            <div class="input-group">
                <label>導入已有譜面 (.json)</label>
                <label for="chart-upload" class="file-label" style="border-color:#aaa; color:#aaa; background:transparent;">導入 JSON 譜面</label>
                <input type="file" id="chart-upload" accept=".json" onchange="importJSON(this)">
            </div>

            <div class="status-board">
                <div class="status-row"><span>當前時間</span><span class="status-val" id="ui-time">00:00.00</span></div>
                <div class="status-row"><span>總音符數</span><span class="status-val" id="ui-notes">0</span></div>
                <div class="status-row"><span>吸附模式 (Ctrl+滾輪)</span><span class="status-val" id="ui-snap">16 分音符</span></div>
            </div>

            <div style="margin-top: auto; display:flex; flex-direction:column; gap:10px;">
                <button class="btn btn-secondary" onclick="clearChart()">清空全部網格</button>
                <button class="btn btn-primary" onclick="exportJSON()">導出 JSON 譜面</button>
            </div>
        </div>

        <div class="editor-container">
            <div class="tip-bar">💡 操作提示：<span>空白鍵</span> 暫停/播放 | <span>滑鼠點擊</span> 放置/刪除音符 | <span>按住 Ctrl + 滾輪</span> 切換分音符</div>
            <canvas id="editorCanvas"></canvas>
        </div>
    </div>

    <audio id="editorAudio" loop></audio>

    <script>
        // 🚀 速度設定：這裡將會與你的 play.html 一樣對接全局 scrollSpeed
        let gameConfig = { scrollSpeed: 5.0, themeColor: '#00ffff', keyMaps: ['d', 'f', 'j', 'k'] };
        let bpm = 120, chartData = [], audioTime = 0, isPlaying = false;
        
        const snapOptions = [4, 8, 12, 16, 24];
        let snapIndex = 3; 
        
        let timelineOffset = 160; // 判定線底部位移，跟遊玩介面 160px 完全同步
        let pixelsPerSecond = 200; // 基礎流速速度

        const audio = document.getElementById('editorAudio');
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');

        let laneWidth = 100, laneX = [];

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const centerX = canvas.width / 2;
            laneWidth = 95; // 同步 play.html 的軌道寬度
            laneX = [centerX - laneWidth * 2, centerX - laneWidth, centerX, centerX + laneWidth];
        }

        function applyGlobalSettings() {
            const saved = localStorage.getItem('MusiCGame_Config');
            if (saved) {
                const config = JSON.parse(saved);
                if (config.scrollSpeed) gameConfig.scrollSpeed = parseFloat(config.scrollSpeed);
                if (config.keyMaps) gameConfig.keyMaps = config.keyMaps;
                if (config.themeColor) {
                    gameConfig.themeColor = config.themeColor;
                    document.documentElement.style.setProperty('--neon', config.themeColor);
                    let c = config.themeColor.replace('#','');
                    if(c.length === 3) c = c.split('').map(x => x+x).join('');
                    const r = parseInt(c.slice(0,2), 16), g = parseInt(c.slice(2,4), 16), b = parseInt(c.slice(4,6), 16);
                    document.documentElement.style.setProperty('--neon-rgb', `${r}, ${g}, ${b}`);
                }
            }
            // 🔥 完美響應流速算式：與 play.html 完全一樣的動態速度換算
            pixelsPerSecond = (canvas.height) * (gameConfig.scrollSpeed / 5.0);
            if (pixelsPerSecond <= 0) pixelsPerSecond = 200; 
        }

        function updateGridSpacing() {
            bpm = parseFloat(document.getElementById('song-bpm').value) || 120;
            if(!isPlaying) renderScene();
        }

        function loadAudio(input) {
            const file = input.files[0];
            if (file) {
                audio.src = URL.createObjectURL(file);
                document.getElementById('audio-label').innerText = file.name;
                const defaultName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
                document.getElementById('song-title').value = defaultName.replace(/\s+/g, '_');
                if(!isPlaying) setTimeout(() => { renderScene(); }, 200);
            }
        }

        function exportJSON() {
            const songTitle = document.getElementById('song-title').value.trim() || "New_Track";
            const packet = {
                title: songTitle,
                bpm: bpm,
                notes: chartData.sort((a, b) => a.time - b.time)
            };
            const jsonStr = JSON.stringify(packet, null, 4);
            const blob = new Blob([jsonStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `${songTitle}_chart.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importJSON(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported && imported.notes && Array.isArray(imported.notes)) {
                        chartData = imported.notes;
                        if (imported.title) document.getElementById('song-title').value = imported.title;
                        if (imported.bpm) {
                            document.getElementById('song-bpm').value = imported.bpm;
                            bpm = imported.bpm;
                        }
                    } else if (Array.isArray(imported)) {
                        chartData = imported;
                    } else {
                        alert("譜面格式不相符！");
                        return;
                    }
                    chartData.forEach(n => { n.time = parseFloat(n.time); n.lane = parseInt(n.lane); });
                    updateUI();
                } catch(err) {
                    alert("JSON 解析失敗！");
                }
            };
            reader.readAsText(file);
        }

        function clearChart() {
            if (confirm("確定要清空當前網格內的所有音符嗎？")) {
                chartData = [];
                updateUI();
            }
        }

        // 🟢 徹底修復：滑鼠滾輪與 Ctrl + 滾輪的事件邏輯
        window.addEventListener('wheel', (e) => {
            const rect = canvas.getBoundingClientRect();
            // 只有當滑鼠在右側 Canvas 畫布區域內滾動時才攔截並控制
            if (e.clientX >= rect.left && e.clientX <= rect.right) {
                e.preventDefault(); 
                
                if (e.ctrlKey) {
                    // 1. Ctrl + 滾輪 ➜ 切換分音符
                    if (e.deltaY < 0) {
                        if (snapIndex < snapOptions.length - 1) snapIndex++;
                    } else {
                        if (snapIndex > 0) snapIndex--;
                    }
                    document.getElementById('ui-snap').innerText = `${snapOptions[snapIndex]} 分音符`;
                } else {
                    // 2. 普通滾輪 ➜ 滾動時間軸時間
                    let step = 0.05; // 每次滾動的基礎時間精細度
                    if (audio.duration) {
                        let nextTime = audioTime + (e.deltaY > 0 ? -step : step);
                        if (nextTime < 0) nextTime = 0;
                        if (nextTime > audio.duration) nextTime = audio.duration;
                        audioTime = nextTime;
                        audio.currentTime = nextTime;
                    } else {
                        // 即使沒傳音樂也能滾動模擬做譜
                        audioTime += (e.deltaY > 0 ? -step : step);
                        if (audioTime < 0) audioTime = 0;
                    }
                }
                
                // ⚡ 核心修復：不論是切網格還是滾動時間，完畢立刻強制刷新 UI 與畫面
                updateUI();
            }
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.keyCode === 32) {
                e.preventDefault();
                if (isPlaying) { 
                    audio.pause(); 
                    isPlaying = false; 
                    audioTime = audio.currentTime;
                    updateUI();
                } else { 
                    audio.currentTime = audioTime;
                    audio.play(); 
                    isPlaying = true; 
                    requestAnimationFrame(editorLoop); 
                }
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            let clickedLane = -1;
            for(let i=0; i<4; i++) {
                if (mouseX >= laneX[i] && mouseX <= laneX[i] + laneWidth) { clickedLane = i; break; }
            }
            if (clickedLane === -1) return;

            const targetYFromBottom = canvas.height - timelineOffset - mouseY;
            const rawTime = audioTime + targetYFromBottom / pixelsPerSecond;

            const currentSnap = snapOptions[snapIndex]; 
            const beatDuration = 60 / bpm; 
            const snapDuration = beatDuration / (currentSnap / 4); 
            
            const snappedTime = Math.round(rawTime / snapDuration) * snapDuration;
            if (snappedTime < 0) return;

            const existingIdx = chartData.findIndex(n => n.lane === clickedLane && Math.abs(n.time - snappedTime) < 0.005);

            if (existingIdx !== -1) {
                chartData.splice(existingIdx, 1);
            } else {
                chartData.push({ time: parseFloat(snappedTime.toFixed(4)), lane: clickedLane });
            }
            updateUI();
        });

        function editorLoop() {
            if (!isPlaying) return;
            audioTime = audio.currentTime;
            updateUI();
            requestAnimationFrame(editorLoop);
        }

        function renderScene() {
            ctx.fillStyle = '#020206'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const H = canvas.height, W = canvas.width;
            const judgmentY = H - timelineOffset;

            // 繪製半透明軌道背景，方便視覺定位
            ctx.fillStyle = 'rgba(255, 255, 255, 0.01)';
            ctx.fillRect(laneX[0], 0, laneWidth * 4, H);

            // 繪製軌道邊界
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)'; ctx.lineWidth = 1;
            for(let i=0; i<=4; i++) {
                const x = i === 4 ? laneX[3] + laneWidth : laneX[i];
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
            }

            // 繪製動態網格線
            const currentSnap = snapOptions[snapIndex];
            const beatDuration = 60 / bpm;
            const snapDuration = beatDuration / (currentSnap / 4);

            const startTime = Math.floor((audioTime - H / pixelsPerSecond) / snapDuration) * snapDuration;
            const endTime = audioTime + H / pixelsPerSecond;

            for (let t = startTime; t <= endTime; t += snapDuration) {
                if (t < 0) continue;
                const lineY = judgmentY - (t - audioTime) * pixelsPerSecond;
                if (lineY < 0 || lineY > H) continue;

                const isFullBeat = Math.abs((t / beatDuration) % 1) < 0.005;
                ctx.strokeStyle = isFullBeat ? `rgba(${getComputedStyle(document.documentElement).getPropertyValue('--neon-rgb') || '0,255,255'}, 0.28)` : 'rgba(255, 255, 255, 0.07)';
                ctx.lineWidth = isFullBeat ? 2 : 1;
                
                ctx.beginPath(); ctx.moveTo(laneX[0], lineY); ctx.lineTo(laneX[3]+laneWidth, lineY); ctx.stroke();
            }

            // 主判定基準線
            ctx.strokeStyle = gameConfig.themeColor; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(laneX[0], judgmentY); ctx.lineTo(laneX[3] + laneWidth, judgmentY); ctx.stroke();

            // 鍵位提示
            ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = 'bold 15px monospace'; ctx.textAlign = 'center';
            for(let i=0; i<4; i++) {
                ctx.fillText(gameConfig.keyMaps[i].toUpperCase(), laneX[i] + laneWidth/2, judgmentY + 30);
            }

            // 繪製音符
            chartData.forEach(note => {
                const noteY = judgmentY - (note.time - audioTime) * pixelsPerSecond;
                if (noteY > -30 && noteY < H + 30) {
                    ctx.fillStyle = gameConfig.themeColor;
                    ctx.fillRect(laneX[note.lane] + 5, noteY - 10, laneWidth - 10, 20);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(laneX[note.lane] + 18, noteY - 3, laneWidth - 36, 6);
                }
            });
        }

        function updateUI() {
            const t = audioTime;
            const m = Math.floor(t / 60), s = Math.floor(t % 60), cs = Math.floor((t % 1) * 100);
            document.getElementById('ui-time').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
            document.getElementById('ui-notes').innerText = chartData.length;
            renderScene(); // 🟢 強制重繪畫面，確保滾動和切網格時畫面 100% 即時渲染
        }

        window.addEventListener('resize', () => { 
            resizeCanvas(); 
            applyGlobalSettings();
            renderScene(); 
        });
        
        window.onload = () => {
            resizeCanvas();
            applyGlobalSettings();
            updateGridSpacing();
            renderScene();
        };
    </script>
</body>
</html>
