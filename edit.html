<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>MusiCGame - Map Architect Fix</title>
    <style>
        :root { 
            --neon: #00ffff; 
            --neon-rgb: 0, 255, 255;
            --bg-dark: #05050e; 
        }
        * { margin:0; padding:0; box-sizing:border-box; user-select: none; }
        body, html { width: 100%; height: 100%; background: var(--bg-dark); font-family: "Microsoft JhengHei", sans-serif; color: #fff; overflow: hidden; }

        .workspace { display: flex; width: 100vw; height: 100vh; }

        /* 左側控制面板 */
        .control-panel { 
            width: 350px; height: 100%; background: rgba(10, 10, 25, 0.95); 
            border-right: 2px solid var(--neon); box-shadow: 5px 0 25px rgba(var(--neon-rgb), 0.2);
            padding: 25px; display: flex; flex-direction: column; gap: 20px; z-index: 10;
        }
        .panel-title { font-size: 24px; font-weight: 900; color: var(--neon); letter-spacing: 2px; text-shadow: 0 0 10px var(--neon); }
        
        .info-group { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 12px; border: 1px solid rgba(var(--neon-rgb), 0.1); }
        .info-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .info-value { font-size: 18px; font-weight: bold; font-family: monospace; color: #fff; }
        
        /* BPM 與音樂輸入框 */
        .input-style {
            width: 100%; padding: 8px; background: #000; border: 1px solid var(--neon);
            color: #fff; border-radius: 4px; font-family: monospace; font-size: 14px; margin-top: 5px;
        }

        .btn-core {
            width: 100%; padding: 12px; font-size: 15px; font-weight: bold; background: transparent;
            color: var(--neon); border: 2px solid var(--neon); border-radius: 6px; cursor: pointer;
            transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-core:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        .btn-core.active { background: #ffaa00; color: #000; border-color: #ffaa00; box-shadow: 0 0 15px #ffaa00; }

        /* 右側編輯畫布區 */
        .editor-container { flex: 1; height: 100%; position: relative; background: #000; }
        canvas { display: block; width: 100%; height: 100%; }

        /* JSON 導出彈窗 */
        #export-modal {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center; z-index: 100;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #export-modal.active { opacity: 1; pointer-events: auto; }
        .modal-window { background: rgba(15, 15, 35, 0.95); border: 2px solid var(--neon); border-radius: 12px; padding: 30px; width: 600px; text-align: center; }
        textarea { width: 100%; height: 300px; background: #000; color: #00ff00; border: 1px solid #333; font-family: monospace; padding: 10px; margin: 15px 0; border-radius: 4px; resize: none; }
    </style>
</head>
<body>

    <div class="workspace">
        <div class="control-panel">
            <div class="panel-title">MAP ARCHITECT</div>
            
            <div class="info-group">
                <div class="info-label">BPM Setting (每分鐘拍數)</div>
                <input type="number" id="bpm-input" class="input-style" value="140" onchange="updateBpm()">
            </div>

            <div class="info-group">
                <div class="info-label">Import Audio (選擇本地音樂)</div>
                <input type="file" id="audio-file" class="input-style" accept="audio/*" onchange="handleAudioImport(event)">
            </div>

            <div class="info-group">
                <div class="info-label">Current Time</div>
                <div class="info-value" id="ui-time">00:00.00</div>
            </div>

            <div class="info-group">
                <div class="info-label">Notes Placed</div>
                <div class="info-value" id="ui-notes">0</div>
            </div>

            <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
                <button class="btn-core" id="play-btn" onclick="togglePlayback()">PLAY (SPACE)</button>
                <button class="btn-core" onclick="clearNotes()">CLEAR</button>
                <button class="btn-core" onclick="exportJSON()">EXPORT JSON</button>
            </div>
        </div>

        <div class="editor-container" id="canvas-holder">
            <canvas id="editorCanvas"></canvas>
        </div>
    </div>

    <div id="export-modal">
        <div class="modal-window">
            <div class="panel-title" style="font-size:20px;">CHART JSON</div>
            <textarea id="json-output" readonly></textarea>
            <button class="btn-core" onclick="document.getElementById('export-modal').classList.remove('active')">CLOSE</button>
        </div>
    </div>

    <audio id="editorAudio"></audio>

    <script>
        // 設定與狀態大腦
        let globalConfig = { scrollSpeed: 5.0, themeColor: '#00ffff', keyMaps: ['d', 'f', 'j', 'k'] };
        let laneWidth = 100; // 軌道寬度
        let laneX = [];
        let chartData = []; 
        
        let audioTime = 0;
        let isPlaying = false;
        let bpm = 140;
        let beatDuration = 60 / 140; // 每拍幾秒

        const audio = document.getElementById('editorAudio');
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');

        // 🟢 強制初始化與重算畫布寬高（修正軌道不顯示的主因）
        function resizeCanvas() {
            const holder = document.getElementById('canvas-holder');
            canvas.width = holder.clientWidth;
            canvas.height = holder.clientHeight;
            
            // 重新計算 4 個軌道的 X 座標，確保它們絕對在畫布正中央
            const centerX = canvas.width / 2;
            laneX = [
                centerX - laneWidth * 2,
                centerX - laneWidth,
                centerX,
                centerX + laneWidth
            ];
            
            // 修正：無論有沒有音樂播放，一縮放或載入就強制刷出畫面
            renderEditor();
        }

        function updateBpm() {
            const val = parseFloat(document.getElementById('bpm-input').value);
            if(val > 0) {
                bpm = val;
                beatDuration = 60 / bpm;
                renderEditor();
            }
        }

        // 🟢 如何導入音頻？使用 Web ObjectURL 實時注入
        function handleAudioImport(event) {
            const file = event.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                audio.src = url;
                audio.load();
                audioTime = 0;
                updateUI();
                renderEditor();
            }
        }

        // 🟢 如何編排按鍵？
        // 模式 1：聽音樂時，實時按下鍵盤 D, F, J, K，直接在當前時間錄製音符！
        window.addEventListener('keydown', (e) => {
            const keyStr = e.key.toLowerCase();
            const laneIdx = globalConfig.keyMaps.indexOf(keyStr);
            
            if (laneIdx !== -1) {
                e.preventDefault();
                const targetTime = parseFloat(audioTime.toFixed(2));
                
                // 檢查是否重複
                const exist = chartData.find(n => Math.abs(n.time - targetTime) < 0.04 && n.lane === laneIdx);
                if (!exist) {
                    chartData.push({ time: targetTime, lane: laneIdx });
                    chartData.sort((a, b) => a.time - b.time);
                    updateUI();
                    if (!isPlaying) renderEditor();
                }
            }

            if (e.code === 'Space') {
                e.preventDefault();
                togglePlayback();
            }
        });

        // 模式 2：滑鼠點擊軌道網格放置/刪除音符；滾輪上下捲動時間軸！
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const H = canvas.height;
            const judgmentY = H - 120; // 判定線位置
            const speed = H * (globalConfig.scrollSpeed * 0.15 + 0.3);

            let clickedLane = -1;
            for(let i=0; i<4; i++) {
                if (mouseX >= laneX[i] && mouseX <= laneX[i] + laneWidth) {
                    clickedLane = i;
                    break;
                }
            }

            if (clickedLane !== -1) {
                // 反推計算滑鼠點擊的精確時間點
                let clickedTime = audioTime + (judgmentY - mouseY) / speed;
                
                // 節奏對齊：吸附到最近的 1/4 拍（音遊編譜必備精密吸附）
                const quarterBeat = beatDuration / 4;
                clickedTime = Math.round(clickedTime / quarterBeat) * quarterBeat;
                clickedTime = parseFloat(clickedTime.toFixed(3));

                if (clickedTime >= 0) {
                    const existIdx = chartData.findIndex(n => Math.abs(n.time - clickedTime) < 0.02 && n.lane === clickedLane);
                    if (existIdx !== -1) {
                        chartData.splice(existIdx, 1); // 如果有了就刪除（橡皮擦）
                    } else {
                        chartData.push({ time: clickedTime, lane: clickedLane }); // 沒有就新增
                        chartData.sort((a, b) => a.time - b.time);
                    }
                    updateUI();
                    renderEditor();
                }
            }
        });

        // 離線用滾輪捲動網格時間軸
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (isPlaying) return; 
            
            // 每次滾輪捲動 1/4 拍
            const step = beatDuration / 4;
            if (e.deltaY > 0) {
                audioTime = Math.max(0, audioTime - step);
            } else {
                audioTime = audioTime + step;
            }
            
            if(audio.src) audio.currentTime = audioTime; // 同步音訊時間
            updateUI();
            renderEditor();
        });

        // ⚙️ 核心繪圖引擎：保證「先清空、後畫網格軌道、最後畫 Note」的嚴格順序
        function gameLoop() {
            if (!isPlaying) return;
            audioTime = audio.currentTime;
            updateUI();
            renderEditor();
            requestAnimationFrame(gameLoop);
        }

        function renderEditor() {
            const W = canvas.width;
            const H = canvas.height;
            if (W === 0 || H === 0) return;

            const speed = H * (globalConfig.scrollSpeed * 0.15 + 0.3); 
            const judgmentY = H - 120; 

            // 1. 先用全黑填滿背景
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, W, H);

            // 2. 畫 4 個垂直軌道
            ctx.fillStyle = 'rgba(255, 255, 255, 0.02)'; // 軌道內側淡淡的顏色
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.15)'; // 軌道邊界霓虹線
            ctx.lineWidth = 1;
            for(let i = 0; i < 4; i++) {
                ctx.fillRect(laneX[i], 0, laneWidth, H);
                ctx.strokeRect(laneX[i], -10, laneWidth, H + 20);
                
                // 按鍵英文字提示 (D, F, J, K)
                ctx.fillStyle = 'rgba(0, 255, 255, 0.4)';
                ctx.font = 'bold 16px monospace';
                ctx.fillText(globalConfig.keyMaps[i].toUpperCase(), laneX[i] + laneWidth/2 - 6, H - 30);
            }

            // 3. 根據 BPM 計算並繪製「橫向節奏小節網格線」
            // 紅色線：正拍 (1拍)；暗灰線：1/4 拍切分音
            let startSec = audioTime - 1;
            let endSec = audioTime + 3;
            const quarter = beatDuration / 4;

            // 找到當前畫面上邊界最接近的拍子起點
            let tStart = Math.floor(Math.max(0, startSec) / quarter) * quarter;

            for (let t = tStart; t < endSec; t += quarter) {
                const gridY = judgmentY - (t - audioTime) * speed;
                if (gridY > 0 && gridY < H) {
                    // 判斷是否為整拍
                    const isFullBeat = Math.abs((t / beatDuration) % 1) < 0.01;
                    ctx.strokeStyle = isFullBeat ? 'rgba(255, 0, 85, 0.4)' : 'rgba(255, 255, 255, 0.06)';
                    ctx.lineWidth = isFullBeat ? 2 : 1;
                    
                    ctx.beginPath();
                    ctx.moveTo(laneX[0], gridY);
                    ctx.lineTo(laneX[3] + laneWidth, gridY);
                    ctx.stroke();
                }
            }

            // 4. 繪製底部橫向基準「判定線」
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffff';
            ctx.beginPath(); 
            ctx.moveTo(laneX[0], judgmentY); 
            ctx.lineTo(laneX[3] + laneWidth, judgmentY); 
            ctx.stroke();
            ctx.shadowBlur = 0; // 重置發光，避免卡效能

            // 5. 繪製編排進去的 Note 音符
            chartData.forEach(note => {
                const noteY = judgmentY - (note.time - audioTime) * speed;
                if (noteY > -30 && noteY < H + 30) {
                    ctx.fillStyle = '#00ffff';
                    ctx.fillRect(laneX[note.lane] + 4, noteY - 10, laneWidth - 8, 20);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(laneX[note.lane] + 20, noteY - 3, laneWidth - 40, 6);
                }
            });
        }

        // 按鈕與播控
        function togglePlayback() {
            const btn = document.getElementById('play-btn');
            if (isPlaying) {
                isPlaying = false;
                audio.pause();
                btn.innerText = "PLAY (SPACE)";
                btn.classList.remove('active');
            } else {
                isPlaying = true;
                if(audio.src) audio.play();
                btn.innerText = "PAUSE (SPACE)";
                btn.classList.add('active');
                requestAnimationFrame(gameLoop);
            }
        }

        function clearNotes() {
            if (confirm("確定清空全部音符？")) { chartData = []; updateUI(); renderEditor(); }
        }

        function exportJSON() {
            // 1. 將譜面數據轉為 JSON 字串
            const jsonStr = JSON.stringify(chartData, null, 4);
            
            // 2. 建立一個 Blob (二進位大型物件) 包裹 JSON 數據
            const blob = new Blob([jsonStr], { type: "application/json" });
            
            // 3. 建立一個虛擬的下載連結
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            
            // 4. 設定檔名，預設叫 chart.json
            a.href = url;
            a.download = "chart.json";
            
            // 5. 模擬點擊，觸發瀏覽器下載
            document.body.appendChild(a);
            a.click();
            
            // 6. 清理記憶體
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }


        function updateUI() {
            const m = Math.floor(audioTime / 60), s = Math.floor(audioTime % 60), cs = Math.floor((audioTime % 1) * 100);
            document.getElementById('ui-time').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
            document.getElementById('ui-notes').innerText = chartData.length;
        }

        audio.addEventListener('timeupdate', () => { if(isPlaying) audioTime = audio.currentTime; });
        window.addEventListener('resize', resizeCanvas);
        
        window.onload = () => {
            // 確保第一時間強行刷出畫布尺寸與背景
            resizeCanvas(); 
        };
    </script>
</body>
</html>
