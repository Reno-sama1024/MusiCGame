<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>MusiCGame_Play</title>
    <style>
        :root { 
            --neon: #00ffff; 
            --neon-rgb: 0, 255, 255;
            --bg-dark: #000000; 
        }
        * { margin:0; padding:0; box-sizing:border-box; user-select: none; }
        body, html { width: 100%; height: 100%; background: var(--bg-dark); font-family: "Microsoft JhengHei", sans-serif; color: #fff; overflow: hidden; }

        canvas { 
            display: block; width: 100vw; height: 100vh; 
            opacity: 0; 
            transition: opacity 0.5s ease; 
        }
        canvas.fade-in { opacity: 1; }

        /* ==================== HUD ==================== */
        .hud { position: absolute; font-weight: bold; pointer-events: none; z-index: 20; color: var(--neon); text-shadow: 0 0 12px var(--neon); }
        #score-text { top: 30px; right: 5%; font-size: 32px; font-family: monospace; letter-spacing: 2px; }
        #track-name { bottom: 30px; left: 5%; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }

        #judgment-text { 
            position: absolute; top: 52%; left: 50%; transform: translate(-50%, -50%) scale(1); 
            font-size: 42px; font-weight: 900; pointer-events: none; z-index: 20; 
            font-style: italic; letter-spacing: 2px;
            opacity: 0;
        }
        #judgment-text.animate-pop {
            animation: judgePop 0.5s cubic-bezier(0.12, 0.85, 0.5, 1) forwards;
        }
        @keyframes judgePop {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
            15% { transform: translate(-50%, -50%) scale(1); }
            60% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
        }
        
        #combo-box { 
            position: absolute; top: 18%; left: 50%; transform: translateX(-50%) scale(0.6); 
            text-align: center; pointer-events: none; z-index: 20; 
            opacity: 0; transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        #combo-box.show { opacity: 1; transform: translateX(-50%) scale(1); }
        #combo-num { font-size: 75px; font-weight: 900; text-shadow: 0 0 25px var(--neon); font-family: monospace; font-style: italic; }
        #combo-label { font-size: 13px; color: var(--neon); letter-spacing: 6px; font-weight: 900; text-indent: 6px; margin-top: -5px; }

        #pause-btn {
            position: absolute; top: 30px; left: 5%; width: 45px; height: 45px;
            border: 2px solid var(--neon); border-radius: 50%; background: rgba(0,0,0,0.4);
            cursor: pointer; z-index: 50; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 10px rgba(var(--neon-rgb), 0.3), inset 0 0 5px rgba(var(--neon-rgb), 0.2);
            transition: all 0.2s;
        }
        #pause-btn:hover { background: var(--neon); box-shadow: 0 0 20px var(--neon); }
        #pause-btn::before, #pause-btn::after {
            content: ""; width: 3px; height: 16px; background: var(--neon); transition: all 0.2s;
        }
        #pause-btn::before { margin-right: 4px; }
        #pause-btn:hover::before, #pause-btn:hover::after { background: #000; }

        #pause-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 90;
            display: none; flex-direction: column; justify-content: center; align-items: center; gap: 25px;
        }
        #pause-overlay.active { display: flex; }
        
        #result-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(3, 3, 8, 0.95); backdrop-filter: blur(12px); z-index: 100;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.6s ease;
        }
        #result-overlay.active { display: flex; opacity: 1; }
        
        .result-box {
            width: 520px; background: rgba(10, 10, 25, 0.6); border: 2px solid var(--neon);
            border-radius: 12px; padding: 40px; box-shadow: 0 0 35px rgba(var(--neon-rgb), 0.2);
            text-align: center; display: flex; flex-direction: column; gap: 24px; position: relative;
        }
        .result-title { font-size: 36px; font-weight: 900; color: var(--neon); text-shadow: 0 0 20px var(--neon); letter-spacing: 6px; }
        
        /* Rank */
        .result-rank-badge {
            font-size: 85px; font-weight: 900; font-style: italic; color: var(--neon);
            text-shadow: 0 0 30px var(--neon); margin: -10px 0; font-family: "Impact", sans-serif;
        }
        
        .result-score { font-size: 50px; font-weight: 900; font-family: monospace; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.3); margin-top: 5px; }
        
        .result-row { display: flex; justify-content: space-between; align-items: center; font-size: 18px; padding: 0 10px; }
        .res-label { color: #888; font-weight: bold; letter-spacing: 1px; }
        .res-value { font-weight: 900; font-family: monospace; font-size: 22px; }
        .val-pf { color: #ffcc00; text-shadow: 0 0 10px rgba(255,204,0,0.3); }
        .val-ms { color: #ff0055; text-shadow: 0 0 10px rgba(255,0,85,0.3); }
        
        .result-buttons { display: flex; gap: 15px; margin-top: 10px; }
        
        .menu-btn {
            flex: 1; padding: 14px; font-size: 16px; font-weight: bold; background: transparent;
            color: #fff; border: 2px solid rgba(255,255,255,0.15); border-radius: 6px; cursor: pointer; transition: all 0.2s;
        }
        .menu-btn:hover {
            border-color: var(--neon); color: var(--neon); box-shadow: 0 0 15px rgba(var(--neon-rgb), 0.4); transform: translateY(-2px);
        }
        
        #loading-mask {
            position: absolute; top:0; left:0; width:100vw; height:100vh; background:#000;
            display:flex; justify-content:center; align-items:center; z-index:150; font-size:20px; color:var(--neon);
        }
    </style>
</head>
<body>

    <div id="loading-mask">LOADING...</div>

    <button id="pause-btn" onclick="togglePause()"></button>

    <div id="pause-overlay">
        <div class="pause-title" style="font-size: 42px; font-weight: 900; color: var(--neon); text-shadow: 0 0 20px var(--neon); letter-spacing: 4px; margin-bottom: 20px;">PAUSED</div>
        <button class="menu-btn" style="width: 220px; flex: none;" onclick="togglePause()">RESUME</button>
        <button class="menu-btn" style="width: 220px; flex: none;" onclick="restartGame()">RESTART</button>
        <button class="menu-btn" style="width: 220px; flex: none;" onclick="location.href='gml.html'">SELECT SONG</button>
    </div>

    <div id="result-overlay">
        <div class="result-box">
            <div class="result-title">TRACK CLEAR</div>
            
            <div class="result-rank-badge" id="res-rank">❌</div>

            <div>
                <div class="res-label" style="font-size: 12px; letter-spacing: 2px;">TOTAL SCORE</div>
                <div class="result-score" id="res-score">0000000</div>
            </div>
            
            <hr style="border: none; border-top: 1px solid rgba(var(--neon-rgb), 0.15);">
            
            <div class="result-row">
                <span class="res-label">MAX COMBO</span>
                <span class="res-value" id="res-combo" style="color: #fff;">0 / 0</span>
            </div>
            <div class="result-row">
                <span class="res-label">PERFECT</span>
                <span class="res-value val-pf" id="res-pf">0</span>
            </div>
            <div class="result-row">
                <span class="res-label">MISS</span>
                <span class="res-value val-ms" id="res-ms">0</span>
            </div>
            
            <div class="result-buttons">
                <button class="menu-btn" onclick="restartGame()">RETRY</button>
                <button class="menu-btn" onclick="location.href='gml.html'">BACK</button>
            </div>
        </div>
    </div>

    <div class="hud" id="score-text">0000000</div>
    <div class="hud" id="track-name">READY</div>
    <div id="combo-box">
        <div id="combo-num">0</div>
        <div id="combo-label">COMBO</div>
    </div>
    <div id="judgment-text"></div>

    <canvas id="gameCanvas"></canvas>
    <audio id="gameAudio"></audio>

    <script>
        let gameConfig = { scrollSpeed: 5.0, themeColor: '#00ffff', keyMaps: ['d', 'f', 'j', 'k'], initialVolume: 1.0 };
        let laneWidth = 95, laneX = [], audioTime = 0, isPlaying = false, isPaused = false, chartData = [];
        let activeLanes = [false, false, false, false];
        let score = 0, combo = 0, maxCombo = 0;
        let countPF = 0, countMS = 0;
        let scorePerNote = 0; 
        let lastNoteTime = 0; 
        let isEnded = false;  

        const audio = document.getElementById('gameAudio');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; calculateLanes(); }
        function calculateLanes() {
            const centerX = window.innerWidth / 2;
            laneX = [centerX - laneWidth * 2, centerX - laneWidth, centerX, centerX + laneWidth];
        }

        function applyGlobalSettings() {
            const saved = localStorage.getItem('MusiCGame_Config');
            if (saved) {
                const config = JSON.parse(saved);
                if (config.scrollSpeed) gameConfig.scrollSpeed = parseFloat(config.scrollSpeed);
                if (config.keyMaps) gameConfig.keyMaps = config.keyMaps;
                if (config.bgmVolume !== undefined) gameConfig.initialVolume = parseFloat(config.bgmVolume);
                if (config.themeColor) {
                    gameConfig.themeColor = config.themeColor;
                    document.documentElement.style.setProperty('--neon', config.themeColor);
                    let c = config.themeColor.replace('#','');
                    if(c.length === 3) c = c.split('').map(x => x+x).join('');
                    const r = parseInt(c.slice(0,2), 16), g = parseInt(c.slice(2,4), 16), b = parseInt(c.slice(4,6), 16);
                    document.documentElement.style.setProperty('--neon-rgb', `${r}, ${g}, ${b}`);
                }
            }
            audio.volume = gameConfig.initialVolume;
        }

        function loadGame() {
            const params = new URLSearchParams(window.location.search);
            const songId = params.get('id') || "test_sanctuary";

            if (songId.startsWith("custom_")) {
                const request = indexedDB.open("MusiCGame_Storage", 2);
                request.onsuccess = (e) => {
                    const db = e.target.result;
                    const transaction = db.transaction(["custom_songs"], "readonly");
                    const getRequest = transaction.objectStore("custom_songs").get(songId);

                    getRequest.onsuccess = () => {
                        const songData = getRequest.result;
                        if (songData) {
                            audio.src = URL.createObjectURL(songData.audioBlob);
                            audio.load();
                            document.getElementById('track-name').innerText = songData.title;
                            
                            // 🔥 【核心結構修復安全解析點】
                            try {
                                const rawChart = JSON.parse(songData.chartString);
                                let finalNotes = [];
                                
                                // 判斷新舊格式：如果是包含 .notes 的物件，就抓取它的 notes 陣列
                                if (rawChart && rawChart.notes && Array.isArray(rawChart.notes)) {
                                    finalNotes = rawChart.notes;
                                } else if (Array.isArray(rawChart)) {
                                    // 相容沒有包裝過設定的舊純陣列 JSON 檔案
                                    finalNotes = rawChart;
                                }
                                
                                setupChart(finalNotes);
                            } catch(err) {
                                console.error("譜面 JSON 解析錯誤:", err);
                                alert("自製譜面內部數據結構異常！");
                                location.href = "gml.html";
                            }
                        } else {
                            alert("找不到自製譜面數據！");
                            location.href = "gml.html";
                        }
                    };
                };
            } else {
                document.getElementById('track-name').innerText = songId === "test_percussion" ? "Cyber Percussion" : "Neo Sanctuary";
                const staticChart = [
                    { time: 1.5, lane: 0 }, { time: 2.0, lane: 1 }, { time: 2.5, lane: 2 }, { time: 3.0, lane: 3 },
                    { time: 4.0, lane: 1 }, { time: 4.5, lane: 2 }, { time: 5.0, lane: 0 }, { time: 5.5, lane: 3 }
                ];
                setupChart(staticChart);
            }
        }

        function setupChart(data) {
            chartData = data;
            chartData.forEach(n => n.hit = false);
            
            if (chartData.length > 0) {
                scorePerNote = 1000000 / chartData.length;
                lastNoteTime = Math.max(...chartData.map(n => n.time));
            } else {
                scorePerNote = 0;
                lastNoteTime = 0;
            }

            document.getElementById('loading-mask').style.display = 'none';
            canvas.classList.add('fade-in');
            setTimeout(startGame, 1000);
        }

        function startGame() {
            score = 0; combo = 0; maxCombo = 0; countPF = 0; countMS = 0; isPaused = false; isEnded = false;
            applyGlobalSettings();
            document.getElementById('score-text').innerText = "0000000";
            document.getElementById('result-overlay').classList.remove('active');
            audio.play().then(() => { isPlaying = true; requestAnimationFrame(gameLoop); });
        }

        function togglePause() {
            if (!isPlaying || isEnded) return;
            isPaused = !isPaused;
            const overlay = document.getElementById('pause-overlay');
            if (isPaused) {
                audio.pause();
                overlay.classList.add('active');
            } else {
                audio.play();
                overlay.classList.remove('active');
                requestAnimationFrame(gameLoop);
            }
        }

        function restartGame() {
            document.getElementById('pause-overlay').classList.remove('active');
            document.getElementById('result-overlay').classList.remove('active');
            audio.currentTime = 0;
            chartData.forEach(n => n.hit = false);
            document.getElementById('combo-box').classList.remove('show');
            triggerJudgment("", "#fff");
            activeLanes = [false, false, false, false];
            startGame();
        }

        function gameLoop() {
            if (!isPlaying || isPaused) return;
            audioTime = audio.currentTime;
            renderScene();
            
            if (!isEnded && chartData.every(n => n.hit) && (audioTime > lastNoteTime + 2.0 || audio.ended)) {
                isEnded = true;
                fadeOutAudioAndEnd();
            }
            
            if (!isEnded) requestAnimationFrame(gameLoop);
        }

        function renderScene() {
            const W = canvas.width, H = canvas.height;
            const speed = H * (gameConfig.scrollSpeed / 5.0); 
            const judgmentY = H - 160;

            ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, W, H);

            for(let i = 0; i < 4; i++) {
                if (activeLanes[i]) {
                    const grad = ctx.createLinearGradient(0, judgmentY, 0, judgmentY - 250);
                    grad.addColorStop(0, `rgba(${getComputedStyle(document.documentElement).getPropertyValue('--neon-rgb')}, 0.25)`);
                    grad.addColorStop(1, `rgba(${getComputedStyle(document.documentElement).getPropertyValue('--neon-rgb')}, 0)`);
                    ctx.fillStyle = grad;
                    ctx.fillRect(laneX[i], judgmentY - 250, laneWidth, 250);
                }
            }

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            for(let i = 0; i < 4; i++) ctx.strokeRect(laneX[i], 0, laneWidth, H);

            ctx.strokeStyle = gameConfig.themeColor; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(laneX[0], judgmentY); ctx.lineTo(laneX[3] + laneWidth, judgmentY); ctx.stroke();

            chartData.forEach(note => {
                if (note.hit) return;
                const noteY = judgmentY - (note.time - audioTime) * speed;

                if (noteY > -50 && noteY < H) {
                    ctx.fillStyle = gameConfig.themeColor;
                    ctx.fillRect(laneX[note.lane] + 4, noteY - 12, laneWidth - 8, 24);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(laneX[note.lane] + 18, noteY - 4, laneWidth - 36, 8);
                }

                if (!note.hit && audioTime - note.time > 0.10) {
                    note.hit = true; combo = 0; countMS++;
                    triggerJudgment("MISS", "#ff0055");
                    document.getElementById('combo-box').classList.remove('show');
                }
            });
        }

        function fadeOutAudioAndEnd() {
            const fadeDuration = 1000;
            const intervalTime = 50;
            const steps = fadeDuration / intervalTime;
            const startVolume = audio.volume;
            let currentStep = 0;

            const fadeInterval = setInterval(() => {
                currentStep++;
                let newVolume = startVolume * (1 - (currentStep / steps));
                if (newVolume < 0) newVolume = 0;
                audio.volume = newVolume;

                if (currentStep >= steps) {
                    clearInterval(fadeInterval);
                    audio.pause();
                    showResultScreen();
                }
            }, intervalTime);
        }

        function showResultScreen() {
            isPlaying = false;
            const finalScore = Math.min(1000000, Math.round(score));
            
            let rankStr = "F";
            let rankColor = "#fff";

            if (countMS === chartData.length && chartData.length > 0) {
                rankStr = "❌";
                rankColor = "#ff0055";
            } else if (finalScore >= 1000000) {
                rankStr = "⭕";
                rankColor = "#ffcc00";
            } else if (finalScore >= 900000) {
                rankStr = "S";
                rankColor = varColor('--neon', '#00ffff');
            } else if (finalScore >= 800000) {
                rankStr = "A";
                rankColor = "#00ff88";
            } else if (finalScore >= 700000) {
                rankStr = "B";
                rankColor = "#00bbff";
            } else if (finalScore >= 600000) {
                rankStr = "C";
                rankColor = "#b87333";
            } else {
                rankStr = "F";
                rankColor = "#777777";
            }

            const rankBadge = document.getElementById('res-rank');
            rankBadge.innerText = rankStr;
            rankBadge.style.color = rankColor;
            rankBadge.style.textShadow = `0 0 30px ${rankColor}`;

            document.getElementById('res-score').innerText = String(finalScore).padStart(7, '0');
            document.getElementById('res-combo').innerText = `${maxCombo} / ${chartData.length}`;
            document.getElementById('res-pf').innerText = countPF;
            document.getElementById('res-ms').innerText = countMS;
            
            document.getElementById('result-overlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('result-overlay').classList.add('active');
            }, 50);
        }

        function varColor(varName, fallback) {
            const rootStyle = getComputedStyle(document.documentElement);
            return rootStyle.getPropertyValue(varName).trim() || fallback;
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' || e.keyCode === 27) {
                e.preventDefault();
                togglePause();
                return;
            }

            if (!isPlaying || isPaused || isEnded) return;
            const laneIdx = gameConfig.keyMaps.indexOf(e.key.toLowerCase());
            if (laneIdx !== -1) {
                activeLanes[laneIdx] = true;

                let targetNote = chartData.find(n => n.lane === laneIdx && !n.hit);
                if (targetNote) {
                    const diff = Math.abs(targetNote.time - audioTime);
                    if (diff <= 0.10) { 
                        targetNote.hit = true;
                        score += scorePerNote; 
                        combo++;
                        countPF++;
                        if (combo > maxCombo) maxCombo = combo; 
                        triggerJudgment("PERFECT", "#ffcc00");
                    } else if (diff > 0.10 && diff <= 0.25) { 
                        targetNote.hit = true; 
                        combo = 0;
                        countMS++;
                        triggerJudgment("MISS", "#ff0055");
                    }
                    
                    document.getElementById('score-text').innerText = String(Math.min(1000000, Math.round(score))).padStart(7, '0');
                    
                    const comboContainer = document.getElementById('combo-box');
                    if (combo >= 1) {
                        document.getElementById('combo-num').innerText = combo;
                        comboContainer.classList.add('show');
                    } else {
                        comboContainer.classList.remove('show');
                    }
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            const laneIdx = gameConfig.keyMaps.indexOf(e.key.toLowerCase());
            if (laneIdx !== -1) activeLanes[laneIdx] = false;
        });

        function triggerJudgment(text, color) {
            const txtEl = document.getElementById('judgment-text');
            if (!text) { txtEl.innerText = ""; txtEl.className = ""; return; }
            txtEl.innerText = text; 
            txtEl.style.color = color;
            txtEl.style.textShadow = `0 0 15px ${color}`;
            
            txtEl.classList.remove('animate-pop');
            void txtEl.offsetWidth; 
            txtEl.classList.add('animate-pop');
        }

        window.addEventListener('resize', resizeCanvas);
        window.onload = () => {
            resizeCanvas();
            applyGlobalSettings();
            loadGame();
        };
    </script>
</body>
</html>
